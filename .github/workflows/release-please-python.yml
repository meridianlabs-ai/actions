name: Release Please — Python package (reusable)

# Reusable workflow: Release Please for a Python package (release-type python;
# repos use hatch-vcs, so RP owns the changelog + creates the tag/GitHub
# Release, and hatch-vcs derives the version from the tag at build time).
#
# This workflow does ONLY release-please (opens/maintains the release PR;
# on merge creates the tag + GitHub Release via the App token). It does NOT
# publish and does NOT post the approval ping:
#   - Publishing stays in the package repo (PyPI trusted publishing can't run
#     from a cross-repo reusable workflow). Either an in-repo publish job gated
#     on `release_created`, or the repo's publish.yaml triggered `on: release`.
#   - The approval ping is posted from the run that contains the gated publish
#     (so it can deep-link to the exact paused run) via the
#     meridianlabs-ai/actions/slack-approval-ping composite action.
#
# Caller (in the package repo, .github/workflows/release.yml):
#   jobs:
#     release-please:
#       permissions: { contents: write, pull-requests: write }
#       uses: meridianlabs-ai/actions/.github/workflows/release-please-python.yml@v1
#       secrets: inherit

on:
  workflow_call:
    inputs:
      config-file:
        type: string
        default: ".release-please-config.json"
      manifest-file:
        type: string
        default: ".release-please-manifest.json"
    secrets:
      RELEASE_PLEASE_APP_ID:
        required: true
      RELEASE_PLEASE_APP_PRIVATE_KEY:
        required: true
    outputs:
      release_created:
        description: "true when the release PR was merged and a release cut"
        value: ${{ jobs.release-please.outputs.release_created }}
      tag_name:
        description: "tag of the created release, if any"
        value: ${{ jobs.release-please.outputs.tag_name }}
      html_url:
        description: "URL of the created GitHub Release (for announcements)"
        value: ${{ jobs.release-please.outputs.html_url }}
      body:
        description: "release notes body of the created release (for announcements)"
        value: ${{ jobs.release-please.outputs.body }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      html_url: ${{ steps.release.outputs.html_url }}
      body: ${{ steps.release.outputs.body }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          release-type: python
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
