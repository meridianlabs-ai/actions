name: Release Please — Python package (reusable)

# Reusable workflow: Release Please for a Python package (release-type python;
# repos use hatch-vcs, so RP owns the changelog + creates the tag/GitHub
# Release, and hatch-vcs derives the version from the tag at build time).
#
# This workflow does release-please only (it does NOT publish — PyPI trusted
# publishing can't run from a cross-repo reusable workflow). Publishing lives in
# the package repo: either an in-repo publish job gated on `release_created`
# (retrofit style), or the repo's publish.yaml triggered `on: release`.
#
# Approval ping: this workflow can post the "awaiting approval" ping itself.
# It deep-links to `github.run_id` — CORRECT when the caller's publish job runs
# in the SAME run (retrofit style: release.yml has release-please + publish).
# For repos where publish is a SEPARATE run (publish.yaml `on: release`), set
# `approval-ping: false` here and post the ping from publish.yaml via the
# meridianlabs-ai/actions/slack-approval-ping composite action (so it deep-links
# to the actual paused run).
#
# Caller (retrofit style — publish in the same run):
#   jobs:
#     release-please:
#       permissions: { contents: write, pull-requests: write }
#       uses: meridianlabs-ai/actions/.github/workflows/release-please-python.yml@v1
#       with: { approvers: "login1 login2" }
#       secrets: inherit
#     publish: { needs: release-please, if: ..., ... }

on:
  workflow_call:
    inputs:
      config-file:
        type: string
        default: ".release-please-config.json"
      manifest-file:
        type: string
        default: ".release-please-manifest.json"
      approvers:
        description: "Space/comma-separated GitHub logins to @-mention in the approval ping (via slack-ids.json)."
        type: string
        default: ""
      approval-ping:
        description: "Post the approval ping from this workflow (deep-links to github.run_id). Set false if publish is a separate run and you ping from there instead."
        type: boolean
        default: true
      target-branch:
        description: "Branch Release Please manages. Leave empty for the default branch (normal releases); set to a maintenance branch (e.g. hotfix/1.4.x) to cut a hotfix release from a released tag."
        type: string
        default: ""
    secrets:
      RELEASE_PLEASE_APP_ID:
        required: true
      RELEASE_PLEASE_APP_PRIVATE_KEY:
        required: true
      SLACK_APPROVALS_WEBHOOK_URL:
        required: false
    outputs:
      release_created:
        description: "true when the release PR was merged and a release cut"
        value: ${{ jobs.release-please.outputs.release_created }}
      tag_name:
        description: "tag of the created release, if any"
        value: ${{ jobs.release-please.outputs.tag_name }}
      html_url:
        description: "URL of the created GitHub Release (for announcements)"
        value: ${{ jobs.release-please.outputs.html_url }}
      body:
        description: "release notes body of the created release (for announcements)"
        value: ${{ jobs.release-please.outputs.body }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      html_url: ${{ steps.release.outputs.html_url }}
      body: ${{ steps.release.outputs.body }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          # No release-type here: in manifest mode it must come from the
          # config-file. Setting it as an input puts the action in simple mode
          # and silently overrides the config's per-package options (versioning
          # strategy, include-v-in-tag, changelog-sections).
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
          # Empty string → the action falls back to the repo default branch.
          target-branch: ${{ inputs.target-branch }}

      # Approval ping (retrofit style: publish runs in this same run, so
      # github.run_id is the run that will pause on the pypi environment).
      - name: Fetch Slack ID map
        if: ${{ inputs.approval-ping && steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: meridianlabs-ai/actions
          ref: v1
          sparse-checkout: slack-ids.json
          sparse-checkout-cone-mode: false
          path: _meridian_actions

      - name: Notify Slack — release awaiting publish approval
        if: ${{ inputs.approval-ping && steps.release.outputs.release_created == 'true' }}
        env:
          SLACK_APPROVALS_WEBHOOK_URL: ${{ secrets.SLACK_APPROVALS_WEBHOOK_URL }}
          APPROVERS: ${{ inputs.approvers }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.release.outputs.tag_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_APPROVALS_WEBHOOK_URL" ]; then
            echo "SLACK_APPROVALS_WEBHOOK_URL not set — skipping Slack notification"
            exit 0
          fi
          mentions=""
          map=_meridian_actions/slack-ids.json
          if [ -f "$map" ] && [ -n "$APPROVERS" ]; then
            for login in $(echo "$APPROVERS" | tr ',' ' '); do
              id=$(jq -r --arg l "$login" '.[$l] // empty' "$map")
              if [ -n "$id" ] && [ "$id" != "TODO" ]; then
                mentions="$mentions <@$id>"
              fi
            done
          fi
          text=":rocket: *${REPO}* ${TAG} release created — PyPI publish is *awaiting approval*.${mentions} Review: ${RUN_URL}"
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$(jq -n --arg t "$text" '{text: $t}')" \
            "$SLACK_APPROVALS_WEBHOOK_URL"
